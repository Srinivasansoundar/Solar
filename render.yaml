services:
  - type: web
    name: smartsolar-backend
    runtime: python
    plan: free
    rootDir: smartsolar/backend
    buildCommand: pip install -r requirements.txt && python download_models.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.12"
